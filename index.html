<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BruCheck Pro | Enterprise</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="phone-frame">
    <div id="page-dash" class="page active">
        <header class="home-header">
            <div class="user-profile">
                <div class="avatar-large">DB</div>
                <div>
                    <h2>Danial Bakar</h2>
                    <small><i class="fas fa-map-marker-alt"></i> Gadong, Brunei</small>
                </div>
            </div>
            <i class="fas fa-bell notification-icon"></i>
        </header>

        <div class="content-scroll">
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-val">12</span>
                    <span class="stat-label">Jobs Done</span>
                </div>
                <div class="stat-card">
                    <span class="stat-val">2</span>
                    <span class="stat-label">Pending</span>
                </div>
                <div class="stat-card highlight">
                    <span class="stat-val">$420</span>
                    <span class="stat-label">Earnings</span>
                </div>
            </div>

            <div class="section-header">
                <h3>Current Assignments</h3>
                <span class="view-all">See All</span>
            </div>

            <div class="job-card" onclick="openJob('Toyota Vios', 'Standard')">
                <div class="job-icon blue"><i class="fas fa-car"></i></div>
                <div class="job-details">
                    <strong>Toyota Vios (2018)</strong>
                    <p>Standard Audit • BAA 1234</p>
                </div>
                <div class="job-arrow"><i class="fas fa-chevron-right"></i></div>
            </div>

            <div class="job-card gold-tier" onclick="openJob('BMW 320i', 'Gold')">
                <div class="job-icon gold"><i class="fas fa-crown"></i></div>
                <div class="job-details">
                    <strong>BMW 320i (2021)</strong>
                    <p>Gold Forensic Audit • B 8888</p>
                </div>
                <div class="job-arrow"><i class="fas fa-chevron-right"></i></div>
            </div>
        </div>
    </div>

    <div id="page-inspect" class="page">
        <div class="inspect-top">
            <button class="back-btn" onclick="nav('page-dash')"><i class="fas fa-arrow-left"></i></button>
            <h3 id="inspect-car-title">Audit Mode</h3>
        </div>
        
        <div class="modern-tabs">
            <div class="m-tab active" id="tab-general" onclick="switchTab('general')">General</div>
            <div class="m-tab" id="tab-engine" onclick="switchTab('engine')">Engine</div>
            <div class="m-tab" id="tab-interior" onclick="switchTab('interior')">Interior</div>
        </div>

        <div id="checklist-scroll" class="content-scroll padded">
            </div>

        <div class="sticky-footer">
            <button class="btn-submit" onclick="submitAudit()">Complete Inspection</button>
        </div>
    </div>

    <nav class="main-nav" id="bottom-bar">
        <div class="nav-btn active" onclick="nav('page-dash')"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-btn"><i class="fas fa-clipboard-list"></i><span>Jobs</span></div>
        <div class="nav-btn"><i class="fas fa-user-circle"></i><span>Profile</span></div>
    </nav>
</div>

<script src="app.js"></script>
</body>
</html>
